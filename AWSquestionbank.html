<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWS Practitioner 在线题库</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --primary: #0ea5e9; --primary-light: #e0f2fe; --primary-hover: #0284c7;
            --secondary: #64748b; --success: #10b981; --success-bg: #d1fae5;
            --error: #f43f5e; --error-bg: #ffe4e6; --text: #0f172a;
            --bg: #f8fafc; --card-bg: #ffffff; --border: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding-bottom: 40px; }

        .container { max-width: 800px; margin: 0 auto; padding: 15px; }

        .header-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .header-title { font-size: 1.3rem; font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 8px;}
        .badge { background: var(--error); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; font-weight: 600; transition: 0.2s;}
        .badge:hover { transform: scale(1.05); }

        .card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); padding: 24px; margin-bottom: 20px; }

        /* 题库选择区样式 */
        .bank-selector { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 10px; }
        @media(min-width: 600px) { .bank-selector { grid-template-columns: 1fr 1fr; } }
        
        .bank-card {
            border: 2px solid var(--border); border-radius: 12px; padding: 30px 20px;
            text-align: center; cursor: pointer; transition: all 0.3s; background: #fff;
        }
        .bank-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.1); }
        .bank-icon { font-size: 3rem; margin-bottom: 10px; }
        .bank-title { font-size: 1.2rem; font-weight: bold; color: var(--text); margin-bottom: 5px; }
        .bank-desc { font-size: 0.9rem; color: var(--secondary); }

        .status-bar { display: flex; justify-content: space-between; align-items: center; color: var(--secondary); font-size: 0.9rem; margin-bottom: 15px; padding: 0 5px; }
        .mode-tag { background: var(--primary); color: white; padding: 4px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; }
        .mode-tag.mistake-mode { background: var(--error); }

        .question-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 24px; white-space: pre-wrap; word-break: break-word; line-height: 1.7;}
        .q-label { color: var(--primary); margin-right: 8px; font-weight: 700; }

        .option-item { display: flex; padding: 14px 16px; margin-bottom: 12px; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; transition: 0.2s; background: #fff; }
        .option-item:hover { background: #f8fafc; border-color: #cbd5e1; }
        .option-label { font-weight: 700; margin-right: 12px; min-width: 25px; color: var(--secondary); font-size: 1.05rem; }
        
        .option-item.selected { border-color: var(--primary); background: var(--primary-light); }
        .option-item.correct { border-color: var(--success); background: var(--success-bg); }
        .option-item.correct .option-label, .option-item.correct span { color: #047857; font-weight: 600;}
        .option-item.wrong { border-color: var(--error); background: var(--error-bg); }
        .option-item.wrong .option-label, .option-item.wrong span { color: #be123c; font-weight: 600;}

        .info-box { margin-top: 15px; padding: 16px; background: #f1f5f9; border-radius: 10px; border-left: 4px solid var(--secondary); display: none; white-space: pre-wrap; word-break: break-word; }
        .info-box.show { display: block; animation: fadeIn 0.3s; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        button { border: none; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; background: var(--card-bg); border: 2px solid var(--border); }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
        .btn-danger { background: var(--error); color: white; border-color: var(--error); }
        .btn-outline { color: var(--primary); border-color: var(--primary); background: transparent; }
        .full-width { grid-column: span 2; }

        .jump-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 20px 0; }
        .jump-container input { width: 80px; padding: 10px; text-align: center; border: 2px solid var(--border); border-radius: 8px; font-weight: 600;}

        .mistake-list-item { border-bottom: 1px solid var(--border); padding: 18px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; }
        .mistake-title { font-weight: 600; font-size: 1.05rem; margin-bottom: 10px; display: block; }
        .mistake-meta { font-size: 0.85rem; color: var(--secondary); display: flex; gap: 10px; align-items: center; }
        .mistake-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; }
        .bg-red { background: var(--error-bg); color: #be123c; }
        .bg-green { background: var(--success-bg); color: #047857; }

        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        #loading { text-align: center; padding: 50px 20px; display: none; }
        .spinner { width: 44px; height: 44px; border: 4px solid var(--primary-light); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-nav">
        <div class="header-title">📘 在线题库系统</div>
        <div class="badge" onclick="showMistakeBook()">错题本 (<span id="mistake-count">0</span>)</div>
    </div>

    <div id="view-upload">
        <div class="card" style="text-align: center; border: none; box-shadow: none; background: transparent;">
            <h2 style="color: var(--text); margin-bottom: 10px;">请选择要练习的题库</h2>
            <p style="color: var(--secondary); font-size: 0.95rem;">点击下方卡片直接加载对应的 PDF 题库</p>
            
            <div class="bank-selector">
                <div class="bank-card" onclick="loadPredefinedBank('cn')">
                    <div class="bank-icon">🇨🇳</div>
                    <div class="bank-title">中文题库</div>
                    <div class="bank-desc">加载 pdf/cn.pdf</div>
                </div>
                
                <div class="bank-card" onclick="loadPredefinedBank('en')">
                    <div class="bank-icon">🇺🇸</div>
                    <div class="bank-title">English Exam</div>
                    <div class="bank-desc">Load pdf/en.pdf</div>
                </div>
            </div>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <p id="loading-text" style="font-weight: 600; color: var(--primary); font-size: 1.1rem;">正在从服务器拉取题库...</p>
        </div>
    </div>

    <div id="view-quiz" class="hidden">
        <div class="status-bar">
            <div>
                <span id="mode-badge" class="mode-tag">全题库模式</span>
                <span id="progress-text" style="margin-left: 12px; font-weight: 700; font-size: 1.05rem;">1 / 100</span>
            </div>
        </div>

        <div class="card">
            <div class="question-text" id="q-text"></div>
            <div id="q-options"></div>
            
            <div class="info-box" id="ans-box">
                <div style="font-weight:bold; color:var(--success); margin-bottom: 8px;">✅ 正确答案：<span id="ans-val"></span></div>
            </div>
            <div class="info-box" id="exp-box">
                <div style="font-weight:bold; color:var(--secondary); margin-bottom:8px;">📖 解析说明：</div>
                <div id="exp-val"></div>
            </div>
        </div>

        <div class="jump-container">
            <input type="number" id="jump-input" placeholder="题号">
            <button class="btn-outline" onclick="jumpTo()" style="padding: 10px 20px;">跳转</button>
        </div>

        <div class="btn-group">
            <button onclick="prevQ()" id="btn-prev">上一题</button>
            <button onclick="nextQ()" id="btn-next" class="btn-primary">下一题</button>
            <button onclick="toggleAns()" class="btn-outline" id="btn-toggle-ans">显示答案</button>
            <button onclick="toggleExp()" class="btn-outline" id="btn-toggle-exp">显示解析</button>
            <button onclick="exitQuiz()" class="full-width" style="color:var(--secondary); background: #f8fafc; border-color: #cbd5e1;">退出返回首页</button>
        </div>
    </div>

    <div id="view-mistake" class="hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom: 2px solid var(--border); padding-bottom: 15px;">
                <h2 style="color: var(--error);">📒 错题本</h2>
                <button class="btn-outline" onclick="closeMistakeBook()" style="padding:8px 16px;">返回</button>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px;">
                <button class="btn-primary" onclick="startMistakePractice()">🔥 开始错题特训</button>
                <button class="btn-danger" onclick="clearMistakes()">🗑️ 清空错题</button>
            </div>

            <div id="mistake-list-container" style="max-height: 65vh; overflow-y: auto;"></div>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // 预设的题库配置和路径
    const PRESET_BANKS = {
        'cn': {
            url: './pdf/cn.pdf',       // 相对路径，确保 GitHub 仓库里有这个文件
            q: '问题',
            a: '正确答案',
            e: '解释',
            optFormat: 'letter'
        },
        'en': {
            url: './pdf/en.pdf',
            q: 'QUESTION',
            a: 'Correct Answer',
            e: 'Explanation',
            optFormat: 'letter'
        }
    };

    function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    let appState = {
        currentBankConfig: null,
        allQuestions: [],     
        currentList: [],      
        currentIndex: 0,      
        isMistakeMode: false, 
        mistakes: []          
    };

    window.onload = () => {
        const saved = localStorage.getItem('github_quiz_mistakes_v1');
        if (saved) {
            appState.mistakes = JSON.parse(saved);
            updateMistakeCount();
        }
    };

    // 核心更改：直接通过 URL 拉取 PDF
    async function loadPredefinedBank(type) {
        const config = PRESET_BANKS[type];
        appState.currentBankConfig = config;

        document.querySelector('.card').classList.add('hidden');
        document.getElementById('loading').style.display = 'block';

        try {
            // 使用 PDF.js 原生 API 从 URL 获取文件
            const loadingTask = pdfjsLib.getDocument(config.url);
            
            // 监听加载进度 (可选，如果文件较大)
            loadingTask.onProgress = function(progressData) {
                if (progressData.total > 0) {
                    const percent = Math.round((progressData.loaded / progressData.total) * 100);
                    document.getElementById('loading-text').innerText = `正在下载题库文件... ${percent}%`;
                }
            };

            const pdf = await loadingTask.promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                document.getElementById('loading-text').innerText = `正在解析第 ${i}/${pdf.numPages} 页...`;
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(item => item.str).join(" ") + "\n";
            }

            document.getElementById('loading-text').innerText = `正在智能切分数据...`;
            setTimeout(() => parseTextToQuestions(fullText, config), 100);

        } catch (e) {
            alert(`加载失败！请确保您的 GitHub 仓库中存在文件：${config.url}\n错误信息: ${e.message}`);
            location.reload();
        }
    }

    function parseTextToQuestions(text, config) {
        const qPrefix = config.q;
        const aPrefix = config.a;
        const ePrefix = config.e;
        const optKeys = config.optFormat === 'letter' ? ['D', 'C', 'B', 'A'] : ['4', '3', '2', '1'];

        let normalizedText = text.replace(/：/g, ':').replace(/．/g, '.').replace(/、/g, '.');
        const splitRegex = new RegExp(`(?=${escapeRegExp(qPrefix)}\\s*\\d+)`, "gi");
        const blocks = normalizedText.split(splitRegex);
        
        const parsed = [];
        let idCounter = 1;

        blocks.forEach(block => {
            if (!block.trim()) return;

            const titleMatch = block.match(new RegExp(`${escapeRegExp(qPrefix)}\\s*(\\d+)`, "i"));
            if (!titleMatch) return;
            const originalId = titleMatch[1];
            
            const ansRegex = new RegExp(`${escapeRegExp(aPrefix)}\\s*[:]?\\s*`, "i");
            const ansMatch = block.match(ansRegex);
            if (!ansMatch) return;

            const ansIndex = ansMatch.index;
            const contentPart = block.substring(0, ansIndex);
            let answerAndExpPart = block.substring(ansIndex + ansMatch[0].length);

            const correctAnsRegex = config.optFormat === 'letter' ? /([A-D])/i : /([1-4])/;
            const correctMatch = answerAndExpPart.match(correctAnsRegex);
            const correctAns = correctMatch ? correctMatch[1].toUpperCase() : "";

            const expRegex = new RegExp(`${escapeRegExp(ePrefix)}\\s*[:]?\\s*`, "i");
            const expMatch = answerAndExpPart.match(expRegex);
            let explanation = "暂无详细解析内容";
            if (expMatch) {
                explanation = answerAndExpPart.substring(expMatch.index + expMatch[0].length).trim();
            }

            let tempContent = contentPart;
            let options = {};
            
            optKeys.forEach(opt => {
                const regex = new RegExp(`(?:^|\\s)${opt}\\.\\s*`, "gi");
                const matches = [...tempContent.matchAll(regex)];
                if (matches.length > 0) {
                    const lastMatch = matches[matches.length - 1];
                    options[opt] = tempContent.substring(lastMatch.index + lastMatch[0].length).trim();
                    tempContent = tempContent.substring(0, lastMatch.index);
                }
            });

            const questionText = tempContent.replace(new RegExp(`${escapeRegExp(qPrefix)}\\s*\\d+`, "i"), "").trim();

            const firstOptKey = config.optFormat === 'letter' ? 'A' : '1';
            if (options[firstOptKey] && correctAns) {
                parsed.push({
                    sysId: idCounter++, 
                    originalId: originalId,
                    prefix: qPrefix,
                    text: questionText,
                    options: options,
                    answer: correctAns,
                    explanation: explanation,
                    optKeys: [...optKeys].reverse() 
                });
            }
        });

        if (parsed.length === 0) {
            alert('解析题库为空，请检查 PDF 内容格式是否与预设匹配。');
            location.reload();
            return;
        }

        appState.allQuestions = parsed;
        startPracticeMode();
    }

    // 后续逻辑保持不变（与之前版本完全一致）
    function startPracticeMode() {
        appState.isMistakeMode = false;
        appState.currentList = appState.allQuestions;
        appState.currentIndex = 0;
        switchView('view-quiz');
        renderQuestion();
    }

    function renderQuestion() {
        const q = appState.currentList[appState.currentIndex];
        
        document.getElementById('mode-badge').innerText = appState.isMistakeMode ? "🔥 错题特训模式" : "📚 全题库练习";
        document.getElementById('mode-badge').className = appState.isMistakeMode ? "mode-tag mistake-mode" : "mode-tag";
        document.getElementById('progress-text').innerText = `${appState.currentIndex + 1} / ${appState.currentList.length}`;
        
        document.getElementById('q-text').innerHTML = `<span class="q-label">${q.prefix} ${q.originalId}.</span>${q.text}`;

        const optContainer = document.getElementById('q-options');
        optContainer.innerHTML = '';
        
        q.optKeys.forEach(key => {
            if (!q.options[key]) return;
            const div = document.createElement('div');
            div.className = 'option-item';
            div.innerHTML = `<span class="option-label">${key}.</span> <span>${q.options[key]}</span>`;
            div.dataset.val = key;
            div.onclick = () => handleOptionClick(key, div);
            optContainer.appendChild(div);
        });

        document.getElementById('ans-box').classList.remove('show');
        document.getElementById('exp-box').classList.remove('show');
        document.getElementById('ans-val').innerText = q.answer;
        document.getElementById('exp-val').innerText = q.explanation;
        
        document.getElementById('btn-toggle-ans').innerText = "显示答案";
        document.getElementById('btn-toggle-exp').innerText = "显示解析";

        document.getElementById('btn-prev').disabled = appState.currentIndex === 0;
        document.getElementById('btn-next').disabled = appState.currentIndex === appState.currentList.length - 1;
        document.getElementById('jump-input').value = '';
    }

    function handleOptionClick(selectedKey, element) {
        const q = appState.currentList[appState.currentIndex];
        if (element.classList.contains('correct') || element.classList.contains('wrong')) return;
        document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected', 'correct', 'wrong'));

        if (selectedKey === q.answer) {
            element.classList.add('correct');
        } else {
            element.classList.add('wrong');
            const correctEl = document.querySelector(`.option-item[data-val="${q.answer}"]`);
            if (correctEl) correctEl.classList.add('correct');
            addMistake(q, selectedKey);
            document.getElementById('ans-box').classList.add('show');
            document.getElementById('exp-box').classList.add('show');
        }
    }

    function addMistake(question, wrongKey) {
        const existingIdx = appState.mistakes.findIndex(m => m.originalId === question.originalId && m.prefix === question.prefix);
        const mistakeRecord = {
            sysId: question.sysId, prefix: question.prefix, originalId: question.originalId,
            text: question.text.length > 60 ? question.text.substring(0, 60) + "..." : question.text,
            answer: question.answer, wrongAnswer: wrongKey, time: new Date().toLocaleString()
        };
        if (existingIdx > -1) { appState.mistakes[existingIdx] = mistakeRecord; } 
        else { appState.mistakes.push(mistakeRecord); }
        saveMistakes(); updateMistakeCount();
    }

    function saveMistakes() { localStorage.setItem('github_quiz_mistakes_v1', JSON.stringify(appState.mistakes)); }
    function updateMistakeCount() { document.getElementById('mistake-count').innerText = appState.mistakes.length; }
    function showMistakeBook() { switchView('view-mistake'); renderMistakeList(); }
    function closeMistakeBook() { if (appState.allQuestions.length > 0) { switchView('view-quiz'); } else { switchView('view-upload'); } }

    function renderMistakeList() {
        const container = document.getElementById('mistake-list-container');
        container.innerHTML = '';
        if (appState.mistakes.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--secondary);">👏 当前没有任何错题记录！</div>';
            return;
        }
        const sortedMistakes = [...appState.mistakes].reverse();
        sortedMistakes.forEach((m) => {
            const realIndex = appState.mistakes.findIndex(orig => orig.originalId === m.originalId && orig.prefix === m.prefix);
            const div = document.createElement('div');
            div.className = 'mistake-list-item';
            div.innerHTML = `
                <div class="mistake-content">
                    <span class="mistake-title">${m.prefix} ${m.originalId}. ${m.text}</span>
                    <div class="mistake-meta">
                        <span class="mistake-badge bg-red">误选: ${m.wrongAnswer}</span>
                        <span class="mistake-badge bg-green">正解: ${m.answer}</span>
                        <span>${m.time}</span>
                    </div>
                </div>
                <button class="btn-outline" style="padding:6px 14px; font-size:0.85rem;" onclick="removeMistake(${realIndex})">移除</button>
            `;
            container.appendChild(div);
        });
    }

    function removeMistake(index) {
        if (confirm('确认将此题从错题本移除吗？')) { appState.mistakes.splice(index, 1); saveMistakes(); updateMistakeCount(); renderMistakeList(); }
    }
    function clearMistakes() {
        if (confirm('⚠️ 确定要清空所有错题记录吗？')) { appState.mistakes = []; saveMistakes(); updateMistakeCount(); renderMistakeList(); }
    }

    function startMistakePractice() {
        if (appState.mistakes.length === 0) { alert('当前错题本为空'); return; }
        if (appState.allQuestions.length === 0) { alert('请先加载任意一个题库，再进行错题练习'); return; }

        const mistakeKeys = new Set(appState.mistakes.map(m => `${m.prefix}_${m.originalId}`));
        const mistakeQuestions = appState.allQuestions.filter(q => mistakeKeys.has(`${q.prefix}_${q.originalId}`));

        if (mistakeQuestions.length === 0) { alert('当前错题不在当前加载的题库中，请切换题库后再试。'); return; }

        appState.currentList = mistakeQuestions;
        appState.isMistakeMode = true; appState.currentIndex = 0;
        switchView('view-quiz'); renderQuestion();
    }

    function switchView(viewId) {
        ['view-upload', 'view-quiz', 'view-mistake'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }

    function toggleAns() {
        const box = document.getElementById('ans-box'); const btn = document.getElementById('btn-toggle-ans');
        box.classList.toggle('show'); btn.innerText = box.classList.contains('show') ? "隐藏答案" : "显示答案";
    }
    function toggleExp() {
        const box = document.getElementById('exp-box'); const btn = document.getElementById('btn-toggle-exp');
        box.classList.toggle('show'); btn.innerText = box.classList.contains('show') ? "隐藏解析" : "显示解析";
    }
    function prevQ() { if (appState.currentIndex > 0) { appState.currentIndex--; renderQuestion(); } }
    function nextQ() { if (appState.currentIndex < appState.currentList.length - 1) { appState.currentIndex++; renderQuestion(); } }
    function jumpTo() {
        const val = parseInt(document.getElementById('jump-input').value);
        if (val && val > 0 && val <= appState.currentList.length) { appState.currentIndex = val - 1; renderQuestion(); } 
        else { alert('请输入正确的题号'); }
    }
    function exitQuiz() { if (confirm('确定要返回首页吗？')) { location.reload(); } }
</script>
</body>
</html>

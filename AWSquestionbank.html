<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWS AI Practitioner 题库</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --aws-orange: #FF9900; --aws-black: #232F3E; --bg-gray: #f4f4f4; --white: #ffffff; --success: #2ed573; --error: #ff4757; }
        body { font-family: "Segoe UI", Arial, sans-serif; background: var(--bg-gray); margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; padding: 15px; }
        header { background: var(--aws-black); color: white; padding: 1rem; text-align: center; border-bottom: 5px solid var(--aws-orange); }
        header h1 { margin: 0; font-size: 1.5rem;}
        
        .toolbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.06); gap: 10px;}
        .jump-box { display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .jump-input { width: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 1rem; }
        
        /* 1 & 2: 答题控制按钮变形问题 & 标题折行问题 */
        /* --- 手机端通用适配优化 --- */
        @media (max-width: 600px) {
            header h1 { font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .toolbar { flex-direction: column; align-items: stretch; gap: 12px; padding: 15px; }
            .jump-box { justify-content: center; width: 100%; }
            .toolbar > div:nth-child(2) { width: 100%; justify-content: space-between; gap: 8px;}
            .toolbar button { flex: 1; padding: 10px 0; font-size: 0.95rem; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
            .jump-input { width: 55px; }
            .cache-notice div { justify-content: flex-start !important; gap: 5px !important;}
            /* 3 & 4: 美化题库卡片和进度条尺寸 */
            .bank-container { flex-direction: column; gap: 15px; }
            .bank-card { width: 100% !important; min-width: auto !important; padding: 20px !important; }
            /* 底部按钮布局优化 */
            .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
            #btn-submit { grid-column: span 2; } /* 提交按钮横跨两列 */}

        .hidden { display: none !important; }
        
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); position: relative; }
        .q-meta { font-size: 0.9rem; color: #666; margin-bottom: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .q-stem { font-size: 1.1rem; line-height: 1.7; color: #111; margin-bottom: 25px; white-space: pre-wrap; word-break: break-word; }
        
        .option { 
            border: 2px solid #e2e8f0; padding: 16px; margin: 10px 0; border-radius: 8px; 
            cursor: pointer; transition: all 0.2s; display: flex; background: #fff; align-items: center; gap: 10px;
        }
        @media (hover: hover) {
            .option:hover { border-color: var(--aws-orange); background: #fff9f0; }
        }
        .option.selected { border-color: var(--aws-orange); background: #fff4e5; font-weight: bold; }
        .option.is-correct { border-color: var(--success); background: #eafff5; }
        .option.is-wrong { border-color: var(--error); background: #fff0f0; }
        .opt-label { font-weight: bold; color: var(--aws-orange); font-size: 1.1rem; }

        .btn-group { display: flex; gap: 12px; margin-top: 25px; flex-wrap: wrap; }
        button { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s;}
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-main { background: var(--aws-orange); color: white; border: none; }
        .btn-main:hover { background: #e08800; }
        .btn-sub { background: #eaeded; color: var(--aws-black); border: 1px solid #adb5bd; }
        .btn-sub:hover { background: #d7dbdd; }
        
        .result-panel { margin-top: 25px; padding: 20px; border-radius: 8px; border: 1px solid #eee; border-left: 6px solid var(--aws-black); background: #fdfdfd; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 1: 清空和重置按钮拥挤问题 */
        .cache-notice { background: #e3f2fd; color: #0d47a1; padding: 12px 15px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .cache-notice div { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; align-items: center;}
        
        /* 3 & 4: 进度条样式 */
        .progress-container { width: 100%; max-width: 400px; height: 16px; background-color: #eee; border-radius: 8px; margin: 15px auto; overflow: hidden; display: none; border: 1px solid #ddd; }
        .progress-bar { height: 100%; background-color: var(--aws-orange); width: 0%; transition: width 0.1s; border-radius: 8px; }
        
        /* 3: 美化题库选择卡片样式 */
        .bank-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 20px;}
        .bank-card { 
            flex: 1; min-width: 250px; background: white; padding: 25px; 
            border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
            text-align: center; cursor: pointer; transition: all 0.2s; 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .bank-card:hover { border-color: var(--aws-orange); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .bank-flag { font-size: 3rem; margin-bottom: 5px; }
        .bank-title { font-size: 1.2rem; font-weight: bold; color: var(--aws-black); }
        .bank-sub { font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<header><h1>AWS AI Practitioner 题库</h1></header>

<div class="container">
    <div id="cache-notice" class="cache-notice hidden">
        <span>检测到缓存，已还原进度。如需更换文档请点击重置题库。</span>
        <div>
            <button class="btn-sub" style="padding:4px 10px; font-size:12px; white-space:nowrap;" onclick="app.clearWrong()">清空错题本</button>
            <button class="btn-sub" style="padding:4px 10px; font-size:12px; white-space:nowrap;" onclick="app.clearCache()">重置题库</button>
        </div>
    </div>
    
    <div id="upload-section">
        <h2 style="text-align: center; margin-bottom: 30px; color: var(--aws-black);">请选择要加载的在线题库</h2>
        <div class="bank-container">
            <div class="bank-card" onclick="app.loadFromUrl('./pdf/cn.pdf')">
                <span class="bank-flag">🇨🇳</span>
                <span class="bank-title">加载中文题库</span>
                <span class="bank-sub">加载 pdf/cn.pdf 文档</span>
            </div>
            <div class="bank-card" onclick="app.loadFromUrl('./pdf/en.pdf')">
                <span class="bank-flag">🇺🇸</span>
                <span class="bank-title">Load English Exam</span>
                <span class="bank-sub">Load pdf/en.pdf Document</span>
            </div>
        </div>
        <div id="status-msg" style="margin-top:25px; color:var(--aws-orange); font-weight:bold; font-size: 1.1rem; text-align: center;"></div>
    </div>
    
    <div id="loading" style="text-align: center; padding: 50px 20px; display: none;">
        <div class="spinner"></div>
        <p id="loading-text" style="font-weight: 600; color: var(--aws-orange); font-size: 1.1rem; margin-bottom: 5px;"></p>
        <div id="progress-container" class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <div class="toolbar">
            <div class="jump-box">
                <span>题号:</span>
                <input type="number" id="jump-idx" class="jump-input" onkeydown="if(event.keyCode==13) app.jumpTo(this.value)">
                <span id="total-display">/ 0</span>
            </div>
            <div style="display:flex; gap:8px;">
                <button id="mode-all" class="btn-main" onclick="app.switchMode('all')">顺序练习</button>
                <button id="mode-wrong" class="btn-sub" onclick="app.switchMode('wrong')">错题本(<span id="wc">0</span>)</button>
            </div>
        </div>

        <div class="card">
            <div class="q-meta">
                <span id="meta-seq">顺序题号: 1 / 0</span>
                <span id="meta-raw" style="color:var(--aws-orange); font-weight:bold;">QUESTION</span>
            </div>
            
            <div id="q-text" class="q-stem"></div>
            <div id="options-box"></div>
            
            <div class="btn-group">
                <button id="btn-prev" class="btn-sub" onclick="app.prev()">上一题</button>
                <button id="btn-submit" class="btn-main" onclick="app.submit()">提交答案</button>
                <button id="btn-next" class="btn-sub" onclick="app.next()">下一题</button>
            </div>

            <div id="res-box" class="hidden result-panel">
                <div><strong>正确答案:</strong> <span id="ans-val" style="color:var(--success); font-size:1.3rem; font-weight:bold; margin-left:10px;"></span></div>
                <div style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                    <strong>解析参考:</strong>
                    <div id="exp-val" style="margin-top:10px; line-height:1.8; color:#444; white-space: pre-wrap;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    class QuizApp {
        constructor() {
            this.KEYS = { DATA: 'aws_data_v10', ALL_IDX: 'aws_all_idx_v10', WRONG_IDX: 'aws_wrong_idx_v10', WRONG: 'aws_wb_v10' };
            this.allQuestions = JSON.parse(localStorage.getItem(this.KEYS.DATA)) || [];
            this.wrongBook = JSON.parse(localStorage.getItem(this.KEYS.WRONG)) || [];
            this.allIndex = parseInt(localStorage.getItem(this.KEYS.ALL_IDX)) || 0;
            this.wrongIndex = parseInt(localStorage.getItem(this.KEYS.WRONG_IDX)) || 0;
            this.mode = 'all'; this.isSubmitted = false; this.selected = new Set(); this.init();
        }

        init() {
            this.updateWC();
            if (this.allQuestions.length > 0) {
                document.getElementById('upload-section').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('cache-notice').classList.remove('hidden');
                this.render();
            }
        }

        // 4: 深度重写加载题库逻辑，增加下载和解析进度条
        async loadFromUrl(url) {
            const sm = document.getElementById('status-msg');
            const loading = document.getElementById('loading');
            const lt = document.getElementById('loading-text');
            const pg = document.getElementById('progress-container');
            const pb = document.getElementById('progress-bar');
            
            // 界面切换：隐藏上传卡片，显示加载卡片和进度条
            document.getElementById('upload-section').classList.add('hidden');
            loading.style.display = 'block';
            pg.style.display = 'block';
            lt.innerText = "正在从服务器拉取文件，请稍候...";
            pb.style.width = '0%';

            try {
                // PDF.js getDocument 原生支持监听下载进度
                const loadingTask = pdfjsLib.getDocument(url);
                
                // 下载进度监听
                loadingTask.onProgress = (progressData) => {
                    if (progressData.total > 0) {
                        const percent = Math.round((progressData.loaded / progressData.total) * 100);
                        lt.innerText = `正在下载文件: ${percent}%...`;
                        pb.style.width = `${percent}%`;
                    }
                };

                const pdf = await loadingTask.promise;
                let fullText = "";
                pb.style.width = '0%'; // 重置进度条用于解析
                
                // 逐页解析文本，通过页数更新百分比进度
                for (let i = 1; i <= pdf.numPages; i++) {
                    const percent = Math.round((i / pdf.numPages) * 100);
                    lt.innerText = `正在提取文字: 第 ${i}/${pdf.numPages} 页...`;
                    pb.style.width = `${percent}%`;
                    
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(item => item.str).join(' ') + "\n";
                }
                
                lt.innerText = "正在屏蔽水印并切分数据逻辑...";
                
                // 切分和缓存逻辑是离线的，很快，无需进度条，给个 100ms 缓冲
                setTimeout(() => {
                    this.extract(fullText);
                }, 100);

            } catch (err) {
                alert(`加载失败！请确保您的 GitHub Pages 路径下存在文件：${url}\n错误信息: ${err.message}`);
                // 加载失败时切回上传页让用户重试
                loading.style.display = 'none';
                document.getElementById('upload-section').classList.remove('hidden');
            }
        }

        // 完全保留原有屏蔽逻辑逻辑，包括“IT认证考试服务”过滤，一行没动
        extract(text) {
            text = text.replace(/店铺：IT认证考试服务|Exam Topic|微信：|www\.examtopic\.com|IT认证考试服务/gi, '');
            const blocks = text.split(/(?=QUESTION\s+\d+|问题\s+\d+)/gi);
            const parsed = [];
            blocks.forEach(block => {
                if (block.length < 50) return;
                const rawNum = block.match(/(?:QUESTION|问题)\s+(\d+)/i);
                const rawID = rawNum ? `QUESTION ${rawNum[1]}` : "QUESTION";
                const optRegex = /(?:\s|^)([A-E])[\.．、\s]\s/g;
                let match, anchors = [];
                while ((match = optRegex.exec(block)) !== null) { anchors.push({ label: match[1], index: match.index, full: match[0] }); }
                if (anchors.length === 0) return;
                const ansKeywords = [/Correct Answer/i, /正确答案/i, /答案/];
                const expKeywords = [/Explanation\/Reference/i, /解释\/参考/i, /解析参考/i, /解析/i, /Explanation/i];
                let idxAns = -1; for (let kw of ansKeywords) { let found = block.search(kw); if (found !== -1) { idxAns = found; break; } }
                let idxExp = -1; for (let kw of expKeywords) { let found = block.search(kw); if (found !== -1) { idxExp = found; break; } }
                const boundary = idxAns !== -1 ? idxAns : block.length;
                let stem = block.substring(0, anchors[0].index).replace(/(QUESTION|问题)\s+\d+/i, '').trim();
                const options = [];
                for (let i = 0; i < anchors.length; i++) {
                    const start = anchors[i].index + anchors[i].full.length;
                    let end = (i + 1 < anchors.length) ? anchors[i+1].index : boundary;
                    let optText = block.substring(start, end).trim().split(/Correct Answer|正确答案|答案/i)[0].trim();
                    if (optText) options.push({ label: anchors[i].label, text: optText });
                }
                const ansPart = block.substring(boundary, idxExp !== -1 ? idxExp : block.length);
                const ansMatch = ansPart.match(/[:：]\s*([A-E\s,]+)/i);
                const answer = ansMatch ? ansMatch[1].replace(/[\s,]/g, '').toUpperCase() : "";
                let exp = "暂无详细解析。";
                if (idxExp !== -1) { exp = block.substring(idxExp).replace(/.*[:：]/, '').trim(); } 
                else if (idxAns !== -1) { let afterAns = block.substring(idxAns).replace(/.*[:：]\s*[A-E\s,]+/i, '').trim(); if (afterAns.length > 5) exp = afterAns; }
                parsed.push({ rawID, stem, options, answer, explanation: exp });
            });
            if (parsed.length > 0) { localStorage.setItem(this.KEYS.DATA, JSON.stringify(parsed)); localStorage.setItem(this.KEYS.ALL_IDX, 0); localStorage.setItem(this.KEYS.WRONG_IDX, 0); location.reload(); } else { alert("未识别到有效题库内容，请检查 PDF 格式或内置规则配置。"); location.reload(); }
        }

        get index() { return this.mode === 'all' ? this.allIndex : this.wrongIndex; }
        set index(val) { if (this.mode === 'all') { this.allIndex = val; localStorage.setItem(this.KEYS.ALL_IDX, val); } else { this.wrongIndex = val; localStorage.setItem(this.KEYS.WRONG_IDX, val); } }
        render() {
            const data = this.mode === 'all' ? this.allQuestions : this.wrongBook;
            const q = data[this.index]; if (!q) return;
            this.isSubmitted = false; this.selected.clear(); document.getElementById('res-box').classList.add('hidden');
            document.getElementById('jump-idx').value = this.index + 1; document.getElementById('total-display').innerText = `/ ${data.length}`; document.getElementById('meta-seq').innerText = `${this.mode === 'all' ? '顺序题号' : '错题题号'}: ${this.index + 1} / ${data.length}`; document.getElementById('meta-raw').innerText = q.rawID; document.getElementById('q-text').innerText = q.stem;
            const ob = document.getElementById('options-box'); ob.innerHTML = '';
            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = `<span class="opt-label">${opt.label}.</span><span class="opt-text">${opt.text}</span>`;
                div.onclick = () => this.toggle(opt.label, div);
                ob.appendChild(div);
            });
            document.getElementById('btn-submit').disabled = false; document.getElementById('btn-prev').disabled = this.index === 0; document.getElementById('btn-next').disabled = this.index === data.length - 1;);
        }
        toggle(label, el) { if (this.isSubmitted) return; if (this.selected.has(label)) { this.selected.delete(label); el.classList.remove('selected'); } else { this.selected.add(label); el.classList.add('selected'); } }
        submit() {
            if (this.selected.size === 0) return alert("请选择答案");
            const data = this.mode === 'all' ? this.allQuestions : this.wrongBook; const q = data[this.index]; const userAns = Array.from(this.selected).sort().join('');
            this.isSubmitted = true; document.getElementById('btn-submit').disabled = true; document.getElementById('ans-val').innerText = q.answer; document.getElementById('exp-val').innerText = q.explanation; document.getElementById('res-box').classList.remove('hidden');
            if (userAns !== q.answer) { if (!this.wrongBook.some(x => x.stem === q.stem)) { this.wrongBook.push(q); localStorage.setItem(this.KEYS.WRONG, JSON.stringify(this.wrongBook)); this.updateWC(); } }
            document.querySelectorAll('.option').forEach(el => { const l = el.querySelector('.opt-label').innerText.replace('.','').trim(); if (q.answer.includes(l)) el.classList.add('is-correct'); else if (this.selected.has(l)) el.classList.add('is-wrong'); });
        }
        switchMode(m) { if (m === 'wrong' && this.wrongBook.length === 0) return alert("错题本还是空的哦！"); this.mode = m; document.getElementById('mode-all').className = m === 'all' ? 'btn-main' : 'btn-sub'; document.getElementById('mode-wrong').className = m === 'wrong' ? 'btn-main' : 'btn-sub'; this.render(); }
        clearCache() { if (confirm("确定要重置题库吗？这会清空所有练习进度（错题本和缓存数据）。")) { localStorage.removeItem(this.KEYS.DATA); localStorage.removeItem(this.KEYS.ALL_IDX); localStorage.removeItem(this.KEYS.WRONG_IDX); localStorage.removeItem(this.KEYS.WRONG); location.reload(); } }
        clearWrong() { if (confirm("确定要清空错题本吗？")) { localStorage.removeItem(this.KEYS.WRONG); localStorage.removeItem(this.KEYS.WRONG_IDX); this.wrongBook = []; this.wrongIndex = 0; this.updateWC(); if (this.mode === 'wrong') this.switchMode('all'); } }
        updateWC() { document.getElementById('wc').innerText = this.wrongBook.length; }
        prev() { if (this.index > 0) { this.index--; this.render(); } }
        next() { if (this.index < (this.mode === 'all' ? this.allQuestions.length : this.wrongBook.length) - 1) { this.index++; this.render(); } }
        jumpTo(v) { const data = this.mode === 'all' ? this.allQuestions : this.wrongBook; const n = parseInt(v) - 1; if (n >= 0 && n < data.length) { this.index = n; this.render(); } }
    }

    const app = new QuizApp();
</script>
</body>
</html>
